# =============================================================================
# Kiro WAF - Nginx Reverse Proxy Configuration
# =============================================================================
# Deployment: firewall.vpsgen.com (103.77.246.198)
# Architecture: Nginx → Client_WAF (:8090) → Master_Server (:8080)
# Mode: Full Strict (TLS termination at Nginx, Cloudflare origin lock)
#
# Requirements: 3.2 (Admin IP restriction), 7.2 (CF origin lock), 10.1 (Production deploy)
# =============================================================================

# --- Rate Limiting Zones ---
limit_req_zone $binary_remote_addr zone=kiro_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=kiro_admin:5m rate=2r/s;

# --- Cloudflare IP Ranges (set_real_ip_from) ---
# These ranges allow Nginx to extract the real visitor IP from CF-Connecting-IP header.
# Source: https://www.cloudflare.com/ips-v4/ and https://www.cloudflare.com/ips-v6/
# Last updated: 2024-01-01 — Update periodically from Cloudflare's published list.

# IPv4
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# IPv6
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# --- Upstream: Client_WAF ---
upstream kiro_client_waf {
    server 127.0.0.1:8090 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

# =============================================================================
# Server Block: HTTP → HTTPS Redirect (Port 80)
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name firewall.vpsgen.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# =============================================================================
# Server Block: HTTPS (Port 443) — Main Configuration
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name firewall.vpsgen.com;

    # --- TLS Configuration ---
    ssl_certificate /etc/letsencrypt/live/firewall.vpsgen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/firewall.vpsgen.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 1.0.0.1 valid=300s;
    resolver_timeout 5s;

    # --- Cloudflare Origin Lock ---
    # Only accept connections from Cloudflare IP ranges.
    # Non-CF IPs are denied, preventing direct origin access bypass.
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    # Allow localhost for health checks and local testing
    allow 127.0.0.1;
    allow ::1;
    deny all;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- Client Settings ---
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_timeout 5s;
    client_body_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # --- Block Common Attack Paths ---
    location ~* ^/(\.env|\.git|phpmyadmin|wp-login\.php|xmlrpc\.php|wp-admin) {
        return 444;
    }

    # --- Admin Path: IP Restricted ---
    # Only IPs listed in kiro-admin-allow.conf can access /admin/
    # Non-allowed IPs receive 404 (not 403) to hide admin existence.
    # Requirement 3.2: Admin IP access control
    location /admin/ {
        include /etc/nginx/kiro-admin-allow.conf;
        deny all;

        # Rate limit admin endpoints more strictly
        limit_req zone=kiro_admin burst=5 nodelay;

        # Proxy to Client_WAF which forwards to Master_Server
        proxy_pass http://kiro_client_waf/admin/;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        # Proxy timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # Proxy buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
        proxy_busy_buffers_size 16k;

        # Return 404 instead of 403 for denied IPs (hide admin path)
        error_page 403 =404 /404.html;
    }

    # --- Health Check Endpoint (internal only) ---
    location /healthz {
        proxy_pass http://kiro_client_waf/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        access_log off;
    }

    # --- All Other Traffic: Through Client_WAF ---
    location / {
        # General rate limiting
        limit_req zone=kiro_general burst=20 nodelay;

        # Proxy to Client_WAF
        proxy_pass http://kiro_client_waf/;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        # Proxy timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # Proxy buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
        proxy_busy_buffers_size 16k;

        # HTTP version for keepalive
        proxy_http_version 1.1;
    }

    # --- Custom Error Pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
}
