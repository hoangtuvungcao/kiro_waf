## Flexible HTTP origin sample:
## Browser HTTPS -> Cloudflare -> Origin HTTP:80.
## This sample does not require ssl_certificate or ssl_certificate_key.
## For Full Strict, see deployments/nginx/kiro-full-strict-mode.conf.

proxy_cache_path /var/cache/nginx/kiro levels=1:2 keys_zone=kiro_cache:100m
                 inactive=10m max_size=1g use_temp_path=off;

limit_req_zone $binary_remote_addr zone=kiro_ip_req:20m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=kiro_ip_conn:20m;

upstream frontend_pool {
    server 127.0.0.1:3000 weight=1 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:3001 weight=1 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream api_pool {
    least_conn;
    server 127.0.0.1:4000 weight=1 max_fails=3 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 80;
    server_name example.com www.example.com;

    # The agent should generate this block from current Cloudflare IP ranges.
    include /etc/nginx/kiro/cloudflare-real-ip.conf;
    real_ip_header CF-Connecting-IP;

    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_timeout 5s;
    client_body_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    limit_conn kiro_ip_conn 20;
    limit_req zone=kiro_ip_req burst=40 nodelay;

    if ($request_method ~* ^(TRACE|CONNECT)$) {
        return 405;
    }

    location ~* ^/(\.env|\.git|phpmyadmin|wp-login\.php|xmlrpc\.php) {
        return 444;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2)$ {
        proxy_cache kiro_cache;
        proxy_cache_valid 200 10m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_pass http://frontend_pool;
    }

    location /login {
        limit_req zone=kiro_ip_req burst=10 nodelay;
        proxy_read_timeout 15s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_pass http://api_pool;
    }

    location /api/search {
        limit_req zone=kiro_ip_req burst=20 nodelay;
        proxy_cache kiro_cache;
        proxy_cache_valid 200 10s;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_pass http://api_pool;
    }

    location /api/ {
        limit_req zone=kiro_ip_req burst=30 nodelay;
        proxy_read_timeout 15s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_pass http://api_pool;
    }

    location / {
        proxy_read_timeout 20s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_pass http://frontend_pool;
    }
}

server {
    listen 80;
    server_name brand-a.example.net brand-b.example.net;

    include /etc/nginx/kiro/cloudflare-real-ip.conf;
    real_ip_header CF-Connecting-IP;

    limit_conn kiro_ip_conn 20;
    limit_req zone=kiro_ip_req burst=40 nodelay;

    location / {
        proxy_read_timeout 20s;
        proxy_connect_timeout 3s;
        proxy_send_timeout 10s;
        proxy_pass http://frontend_pool;
    }
}
