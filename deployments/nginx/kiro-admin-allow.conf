# =============================================================================
# Kiro WAF - Admin IP Allowlist
# =============================================================================
# This file is included by kiro-waf.conf to restrict /admin/ access.
# Only IPs listed here can reach the admin panel.
# Non-listed IPs receive HTTP 404 (admin path is hidden).
#
# Requirement 3.2: Admin IP access control
#
# Usage: Add trusted admin IPs below, one per line.
# Format: allow <IP_ADDRESS>;
#
# After editing, reload Nginx: sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Master VPS itself (localhost)
allow 127.0.0.1;
allow ::1;

# Primary admin IP (replace with your actual admin IP)
allow 103.77.246.198;

# Example: Additional admin IPs (uncomment and modify as needed)
# allow 203.0.113.10;
# allow 198.51.100.25;
# allow 2001:db8::1;
