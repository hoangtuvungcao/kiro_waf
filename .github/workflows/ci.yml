name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go format check
        run: |
          test -z "$(gofmt -l cmd internal tests master-server client-node)"

      - name: Test
        run: go test ./...

      - name: Standalone master/client build
        run: |
          go build -o /tmp/kiro-master ./master-server
          go build -o /tmp/kiro-client-waf ./client-node
          bash scripts/build-xdp.sh client-node/xdp_filter.c /tmp/xdp_filter.o

      - name: Validate JSON examples
        run: |
          python3 -m json.tool examples/license.example.json >/tmp/license.json
          python3 -m json.tool examples/update-manifest.example.json >/tmp/update-manifest.json
          bash -n deployments/lab/firewall-apply-ubuntu-22.04.sh
          bash -n scripts/ci-phase10-smoke.sh
          bash -n deploy_master.sh

      - name: Config checks
        run: |
          go run ./cmd/kiro-agent --config configs/kiro.example.yaml --check
          go run ./cmd/kiro-agent --config configs/kiro.advanced.example.yaml --check --skip-license-check
          go run ./cmd/kiro-provider --config configs/provider.example.yaml --check
          go run ./cmd/kiro-cli version

      - name: Provider license smoke
        run: |
          tmpdir="$(mktemp -d)"
          sed "s#/etc/kiro-provider#$tmpdir/keys#g; s#/var/lib/kiro-provider#$tmpdir/provider-data#g" configs/provider.example.yaml > "$tmpdir/provider.yaml"
          go run ./cmd/kiro-provider --config "$tmpdir/provider.yaml" gen-dev-keys
          go run ./cmd/kiro-provider --config "$tmpdir/provider.yaml" issue-test-license --fingerprint-hash sha256:ci-test --agent-out-dir "$tmpdir/agent"
          go run ./cmd/kiro-agent --config configs/kiro.example.yaml --check --license-file "$tmpdir/agent/license.json" --provider-public-key "$tmpdir/agent/provider-public-key.pem" --machine-fingerprint sha256:ci-test

      - name: Firewall dry-run smoke
        run: |
          tmpdir="$(mktemp -d)"
          go run ./cmd/kiro-agent --config configs/kiro.example.yaml --firewall-dry-run | grep kiro_cloudflare_direct_origin_drop
          go run ./cmd/kiro-agent --config configs/tenant.server-only.example.yaml --firewall-dry-run --firewall-snapshot-dir "$tmpdir" >/tmp/kiro-nftables.rules
          test -s "$tmpdir/last-good-nftables.json"
          if go run ./cmd/kiro-agent --config configs/tenant.server-only.example.yaml --firewall-apply 2>/tmp/kiro-firewall-apply.err; then
            echo "firewall apply must require lab acknowledgement"
            exit 1
          fi
          grep KIRO_LAB_FIREWALL_APPLY /tmp/kiro-firewall-apply.err

      - name: Proxy generator smoke
        run: |
          tmpdir="$(mktemp -d)"
          go run ./cmd/kiro-agent --config configs/kiro.example.yaml --proxy-dry-run --proxy-output-dir "$tmpdir" >/tmp/kiro-nginx.conf
          grep 'server_name example.com www.example.com;' /tmp/kiro-nginx.conf
          grep 'location /api/' /tmp/kiro-nginx.conf
          grep 'set_real_ip_from' "$tmpdir/cloudflare-real-ip.conf"
          go run ./cmd/kiro-agent --config configs/tenant.server-only.example.yaml --proxy-dry-run | grep 'proxy disabled in server mode'
          go run ./cmd/kiro-agent --config configs/tenant.full-strict.example.yaml --proxy-dry-run | grep 'listen 443 ssl'

      - name: Phase 10 regression smoke
        run: bash scripts/ci-phase10-smoke.sh
