  <!-- Network nodes - middle row -->
  <circle cx="196" cy="220" r="10" fill="#14b8a6" opacity="0.8"/>
  <circle cx="316" cy="220" r="10" fill="#14b8a6" opacity="0.8"/>
  <!-- Network nodes - bottom row -->
  <circle cx="176" cy="300" r="8" fill="#14b8a6" opacity="0.6"/>
  <circle cx="256" cy="300" r="8" fill="#14b8a6" opacity="0.6"/>
  <circle cx="336" cy="300" r="8" fill="#14b8a6" opacity="0.6"/>
  <!-- Network connections -->
  <line x1="256" y1="160" x2="196" y2="220" stroke="#14b8a6" stroke-width="2.5" opacity="0.7"/>
  <line x1="256" y1="160" x2="316" y2="220" stroke="#14b8a6" stroke-width="2.5" opacity="0.7"/>
  <line x1="196" y1="220" x2="176" y2="300" stroke="#14b8a6" stroke-width="2" opacity="0.5"/>
  <line x1="196" y1="220" x2="256" y2="300" stroke="#14b8a6" stroke-width="2" opacity="0.5"/>
  <line x1="316" y1="220" x2="256" y2="300" stroke="#14b8a6" stroke-width="2" opacity="0.5"/>
  <line x1="316" y1="220" x2="336" y2="300" stroke="#14b8a6" stroke-width="2" opacity="0.5"/>
  <line x1="196" y1="220" x2="316" y2="220" stroke="#14b8a6" stroke-width="2" opacity="0.4"/>
  <!-- Lock body -->
  <rect x="224" y="320" width="64" height="52" rx="8" ry="8" fill="url(#lockGrad)"/>
  <!-- Lock shackle -->
  <path d="M236 320 L236 296 C236 278 248 268 256 268 C264 268 276 278 276 296 L276 320"
