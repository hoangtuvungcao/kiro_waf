  <!-- Lock keyhole -->
  <circle cx="256" cy="342" r="8" fill="#0f172a"/>
  <rect x="253" y="342" width="6" height="14" rx="3" fill="#0f172a"/>
  <!-- Subtle glow effect on shield edge -->
  <path d="M256 28 L456 108 C456 108 468 280 380 380 C320 440 256 484 256 484 C256 484 192 440 132 380 C44 280 56 108 56 108 Z"
