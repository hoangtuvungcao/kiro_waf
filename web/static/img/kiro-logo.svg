    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Shield outline -->
  <path d="M256 28 L456 108 C456 108 468 280 380 380 C320 440 256 484 256 484 C256 484 192 440 132 380 C44 280 56 108 56 108 Z"
