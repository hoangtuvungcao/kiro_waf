{{define "content"}}
<div class="page-header">
    <h1>Đăng Phát Hành Mới</h1>
    <p>Đăng artifact cập nhật cho một component</p>
</div>

<div class="card" style="max-width: 720px;">
    <form method="POST" action="/admin/releases">
        <div class="form-row">
            <div class="form-group">
                <label for="component">Component</label>
                <select id="component" name="component" required>
                    <option value="">-- Chọn component --</option>
                    <option value="kiro-client-waf">kiro-client-waf</option>
                    <option value="kiro-master">kiro-master</option>
                    <option value="xdp_filter">xdp_filter</option>
                    <option value="kiro-cli">kiro-cli</option>
                </select>
            </div>
            <div class="form-group">
                <label for="channel">Channel</label>
                <select id="channel" name="channel" required>
                    <option value="stable">stable</option>
                    <option value="security">security</option>
                    <option value="beta">beta</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="version">Version</label>
                <input type="text" id="version" name="version" required placeholder="VD: 1.2.3">
            </div>
            <div class="form-group">
                <label for="min_version">Min Version (tùy chọn)</label>
                <input type="text" id="min_version" name="min_version" value="0.0.0" placeholder="VD: 1.0.0">
            </div>
        </div>

        <div class="form-group">
            <label for="artifact_url">Artifact URL</label>
            <input type="url" id="artifact_url" name="artifact_url" required placeholder="https://releases.example.com/kiro-client-waf-1.2.3-linux-amd64">
        </div>

        <div class="form-group">
            <label for="sha256">SHA256 Checksum</label>
            <input type="text" id="sha256" name="sha256" required placeholder="64 ký tự hex" pattern="[a-fA-F0-9]{64}" title="SHA256 hash phải là 64 ký tự hex">
        </div>

        <div class="form-group">
            <label for="notes">Ghi chú phát hành</label>
            <textarea id="notes" name="notes" rows="3" placeholder="Mô tả thay đổi..."></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Đăng Phát Hành</button>
            <a href="/admin/releases" class="btn btn-secondary">Hủy</a>
        </div>
    </form>
</div>
{{end}}
